<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Love, Always — The wartime letters of Raymond Eugene Lankford</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="A family archive of letters written by Raymond Eugene Lankford to Joan Northcutt, 1940." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Caveat:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" />

<style>
:root {
  --paper:        #F5EFE0;
  --paper-deep:   #EDE4CC;
  --card:         #ECE3D0;
  --card-deep:    #E3D6BB;
  --walnut:       #3B2A1A;
  --walnut-soft:  #5C4733;
  --walnut-mute:  #806852;
  --brass:        #9B7B3F;
  --brass-soft:   #C8AC74;
  --brass-faint:  #E2D1A9;
  --ink:          #1F1B17;
  --telegram:     #E8DDC4;
  --navy:         #1F2D3D;
  --navy-soft:    #2C4258;
  --navy-deep:    #15202C;

  --serif-display: "Cormorant Garamond", "EB Garamond", Garamond, serif;
  --serif-body:    "Source Serif 4", "Source Serif Pro", Georgia, serif;
  --hand:          "Caveat", "Homemade Apple", cursive;
  --mono:          "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --measure: 36rem;
}

* { box-sizing: border-box; }

html, body {
  background: var(--paper);
  margin: 0;
  padding: 0;
  /* Lock the viewport so the book stage owns scroll */
  overflow: hidden;
  height: 100%;
  transition: background 0.4s ease;
}
body {
  font-family: var(--serif-body);
  color: var(--walnut);
  font-size: 17px;
  line-height: 1.7;
  font-feature-settings: "onum", "kern";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Navy body when on a chapter divider page (set by App via classList) */
body.body--navy,
body.body--navy html { background: var(--navy); }
body.body--navy .stage { background: var(--navy); }

/* paper grain — extremely subtle */
.paper-grain {
  position: fixed; inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(155,123,63,0.04), transparent 60%),
    radial-gradient(ellipse at 90% 95%, rgba(60,40,20,0.04), transparent 55%);
  z-index: 1;
  transition: opacity 1.2s ease;
}
body.body--navy .paper-grain { opacity: 0; }

::selection { background: rgba(155,123,63,0.28); color: var(--ink); }

/* ---- atmospheric layer ------------------------------------------- */

.atmosphere {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  overflow: hidden;
  opacity: 0;
  transition: opacity 1.4s ease;
}
.atmosphere--on { opacity: 1; }

/* snow (great lakes) */
.snow-flake {
  position: absolute;
  top: -10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.55);
  box-shadow: 0 0 4px rgba(255,255,255,0.4);
  animation-name: snow-fall;
  animation-iteration-count: infinite;
  animation-timing-function: linear;
  will-change: transform;
}
@keyframes snow-fall {
  0%   { transform: translate3d(0, -10vh, 0) translateX(0); opacity: 0; }
  10%  { opacity: var(--snow-op, 0.55); }
  90%  { opacity: var(--snow-op, 0.55); }
  100% { transform: translate3d(var(--snow-drift, 40px), 110vh, 0); opacity: 0; }
}

/* dust motes (san diego) */
.dust-mote {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255, 220, 150, 0.7), rgba(200,160,80,0.05) 70%);
  filter: blur(0.3px);
  animation-name: dust-drift;
  animation-iteration-count: infinite;
  animation-timing-function: ease-in-out;
  will-change: transform;
}
@keyframes dust-drift {
  0%   { transform: translate3d(0,0,0); opacity: 0; }
  20%  { opacity: var(--dust-op, 0.45); }
  80%  { opacity: var(--dust-op, 0.45); }
  100% { transform: translate3d(var(--dust-x, 80px), var(--dust-y, -120px), 0); opacity: 0; }
}

/* sea horizon (pearl harbor) — subtle horizontal drift */
.sea-layer {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 120% 40% at 50% 65%, rgba(31, 45, 61, 0.18), transparent 70%),
    radial-gradient(ellipse 100% 22% at 50% 70%, rgba(155, 123, 63, 0.10), transparent 75%);
}
.sea-shimmer {
  position: absolute;
  bottom: 28%;
  left: -10%;
  right: -10%;
  height: 1px;
  background: linear-gradient(to right,
    transparent,
    rgba(226, 209, 169, 0.0) 20%,
    rgba(226, 209, 169, 0.55) 50%,
    rgba(226, 209, 169, 0.0) 80%,
    transparent);
  animation: sea-shimmer 9s ease-in-out infinite;
}
.sea-shimmer.s2 { bottom: 32%; animation-delay: 2.5s; animation-duration: 11s; opacity: 0.6; }
.sea-shimmer.s3 { bottom: 24%; animation-delay: 5s; animation-duration: 13s; opacity: 0.5; }
@keyframes sea-shimmer {
  0%, 100% { transform: translateX(-30px); opacity: 0; }
  50% { opacity: 0.7; }
  100% { transform: translateX(30px); opacity: 0; }
}

/* gentle palm-shadow sweep across the lower portion */
.sea-vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(31,45,61,0.18), transparent 70%);
  animation: sea-breathe 18s ease-in-out infinite;
}
@keyframes sea-breathe {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

@media (prefers-reduced-motion: reduce) {
  .snow-flake, .dust-mote, .sea-shimmer, .sea-vignette {
    animation: none !important;
  }
}

/* ---- book stage --------------------------------------------------- */

.stage {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  z-index: 3;
}

/* page surface — fills the viewport, scrolls internally.
   Framer Motion drives the cross-fade via inline opacity. */
.page-surface {
  position: absolute;
  inset: 0;
  background: var(--paper);
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  box-shadow: inset 18px 0 28px -18px rgba(60,40,20,0.18);
}

.page-surface.is-navy {
  background: var(--navy);
  box-shadow: inset 18px 0 32px -18px rgba(0,0,0,0.5);
}

/* ---- archive layout (inside each page surface) ------------------- */

.archive {
  position: relative;
  z-index: 1;
  max-width: 44rem;
  margin: 0 auto;
  padding: 3.2rem 1.5rem 6rem;
}
@media (min-width: 720px) {
  .archive { padding: 3.6rem 2.5rem 7rem; }
}

/* ---- folio (was "page-indicator") -------------------------------- */
/* Now lives INSIDE the scroll surface as a small folio mark up top.   */

.folio {
  display: block;
  width: 100%;
  text-align: center !important;
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 0.7rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--walnut-mute);
  margin: 0 0 1.6rem;
  user-select: none;
}
.folio .dot { color: var(--brass); margin: 0 0.55em; }
.is-navy .folio,
body.body--navy .folio { color: var(--brass-faint); }

/* ---- title page -------------------------------------------------- */

.title-page {
  text-align: center;
  padding: 4rem 0 3rem;
  min-height: calc(100vh - 8rem);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.title-eyebrow {
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 0.78rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--brass);
  margin-bottom: 2.5rem;
  font-weight: 400;
}

.title {
  font-family: var(--serif-display);
  font-weight: 500;
  font-size: clamp(3.2rem, 9vw, 5.8rem);
  line-height: 1.05;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 0 0 1.6rem;
  font-style: italic;
}

.subtitle {
  font-family: var(--serif-display);
  font-weight: 400;
  font-size: clamp(1.05rem, 2.2vw, 1.3rem);
  line-height: 1.5;
  color: var(--walnut-soft);
  max-width: 32rem;
  margin: 0 auto 3rem;
  letter-spacing: 0.005em;
}

.ornament {
  display: flex;
  align-items: center;
  gap: 1.2rem;
  width: min(20rem, 60vw);
  margin: 0 auto 2.5rem;
}
.ornament-rule {
  flex: 1; height: 1px; background: var(--brass);
  opacity: 0.65;
}
.ornament-anchor { width: 28px; height: 28px; flex-shrink: 0; }

.frontispiece {
  font-family: var(--serif-body);
  font-style: italic;
  color: var(--walnut-mute);
  font-size: 0.95rem;
  line-height: 1.65;
  margin: 0 0 4rem;
  max-width: 26rem;
}

.title-count {
  font-family: var(--serif-display);
  font-style: italic;
  color: var(--walnut-mute);
  font-size: 0.95rem;
  line-height: 1.6;
  margin: 0;
  letter-spacing: 0.01em;
}

.title-prompt {
  margin-top: 3rem;
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 0.78rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--brass);
  animation: prompt-pulse 3.4s ease-in-out infinite;
}
@keyframes prompt-pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.95; }
}

/* ---- chapter divider --------------------------------------------- */

.chapter-divider {
  text-align: center;
  padding: 2rem 0 2rem;
  min-height: calc(100vh - 8rem);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.chapter-numeral {
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 0.78rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--brass-soft);
  margin-bottom: 1.3rem;
}
.chapter-title {
  font-family: var(--serif-display);
  font-style: italic;
  font-weight: 500;
  font-size: clamp(2.6rem, 6.4vw, 4rem);
  color: var(--paper);
  margin: 0 0 0.6rem;
  letter-spacing: -0.005em;
  line-height: 1.1;
}
.chapter-loc {
  font-family: var(--serif-display);
  font-size: 1.05rem;
  color: var(--brass-faint);
  margin-bottom: 0.4rem;
}
.chapter-dates {
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--brass-soft);
  letter-spacing: 0.01em;
}

.chapter-bridge {
  font-family: var(--serif-body);
  font-size: 1.05rem;
  line-height: 1.75;
  color: var(--brass-faint);
  max-width: 33rem;
  margin: 2rem auto 2.5rem;
  text-align: left;
  text-wrap: pretty;
}

/* ---- route diagram ----------------------------------------------- */

.route-wrap {
  margin: 2.5rem auto 3rem;
  max-width: 34rem;
  width: 100%;
}
.route-svg {
  width: 100%;
  height: auto;
  display: block;
  overflow: visible;
}
.route-line {
  stroke: var(--brass);
  stroke-width: 1.4;
  stroke-dasharray: 2 5;
  opacity: 0.6;
  fill: none;
  stroke-linecap: round;
}
.route-pin-active {
  fill: var(--paper);
  stroke: var(--paper);
  stroke-width: 1;
}
.route-pin-inactive {
  fill: none;
  stroke: var(--brass-soft);
  stroke-width: 1.4;
}
.route-label {
  font-family: var(--serif-body);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  fill: var(--brass-faint);
}
.route-label--active {
  fill: var(--paper);
  font-weight: 500;
}
.route-date {
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 9px;
  letter-spacing: 0.04em;
  fill: var(--brass-soft);
}

/* ---- letter card ------------------------------------------------- */

.letter-card {
  margin: 0 auto;
  max-width: var(--measure);
  padding: 0;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.letter-head {
  text-align: center;
  margin-bottom: 1.6rem;
}
.letter-num {
  font-family: var(--serif-display);
  font-style: italic;
  font-size: 1.15rem;
  color: var(--ink);
  letter-spacing: 0.005em;
}
.letter-num .dot {
  color: var(--brass);
  margin: 0 0.3em;
}
.letter-stamp {
  font-family: var(--serif-body);
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--walnut-mute);
  margin-top: 0.5rem;
  font-weight: 500;
}

.letter-body {
  background: var(--card);
  padding: 2.4rem clamp(1.5rem, 4vw, 3rem) 2.2rem;
  border-radius: 1px;
  position: relative;
  font-family: var(--serif-body);
  font-size: 1.02rem;
  line-height: 1.75;
  color: var(--walnut);
  text-wrap: pretty;
  hyphens: auto;
  width: 100%;
}

.salutation {
  font-family: var(--serif-display);
  font-style: italic;
  font-size: 1.2rem;
  color: var(--ink);
  margin-bottom: 1.2rem;
}

.letter-body p {
  margin: 0 0 1.1rem;
}
.letter-body p:last-of-type { margin-bottom: 0; }

.signature {
  font-family: var(--hand);
  font-size: 2.2rem;
  color: var(--ink);
  margin: 1.5rem 0 0.4rem;
  line-height: 1;
  letter-spacing: 0.005em;
}
.signature--xmas { text-align: center; margin-top: 1.2rem; }

.postscript {
  font-size: 0.94rem;
  color: var(--walnut-soft);
  margin-top: 1.3rem;
  font-style: italic;
}
.ps-mark {
  font-style: normal;
  font-variant: small-caps;
  letter-spacing: 0.05em;
  color: var(--brass);
  margin-right: 0.3em;
  font-weight: 500;
}

.incomplete-marker {
  font-style: italic;
  color: var(--walnut-mute);
  text-align: center;
  margin: 1.5rem 0 0;
  font-size: 0.92rem;
  letter-spacing: 0.04em;
}

.uncertain {
  font-size: 0.62em;
  color: var(--walnut-mute);
  vertical-align: sub;
  margin: 0 0.05em;
  font-style: italic;
}

.letter-note {
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 0.9rem;
  color: var(--walnut-mute);
  text-align: center;
  margin: 1.4rem auto 0;
  max-width: 30rem;
  line-height: 1.65;
}

/* ---- photo link -------------------------------------------------- */

.photo-link {
  background: none;
  border: none;
  font-family: var(--serif-body);
  font-style: italic;
  color: var(--brass);
  font-size: 0.92rem;
  cursor: pointer;
  display: inline-flex;
  align-items: baseline;
  gap: 0.7em;
  margin: 1.2rem auto 0;
  padding: 0.4em 0;
  letter-spacing: 0.005em;
  border-bottom: 1px solid transparent;
  transition: color 0.18s, border-color 0.18s;
  text-align: center;
}
.photo-link:hover, .photo-link:focus-visible {
  color: var(--ink);
  border-bottom-color: var(--brass);
  outline: none;
}
.photo-link-meta {
  font-style: normal;
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--walnut-mute);
}

/* ---- envelope card ----------------------------------------------- */

.envelope-stage {
  width: 100%;
  display: flex;
  justify-content: center;
  margin: 0.5rem 0 1rem;
}
.envelope-img {
  background: none; border: none; padding: 0; cursor: pointer;
  width: 100%; max-width: 28rem;
}
.envelope-img img {
  width: 100%; height: auto; display: block;
  background: var(--card-deep);
  filter: sepia(0.06) saturate(0.92);
  box-shadow: 0 1px 0 rgba(60,40,20,0.06);
  transition: opacity 0.2s;
}
.envelope-img:hover img, .envelope-img:focus-visible img { opacity: 0.88; outline: none; }

.envelope-note { color: var(--walnut-soft); }

/* ---- christmas card ---------------------------------------------- */

.letter-card--xmas .letter-head { margin-top: 0.4rem; }
.xmas-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--card);
  padding: 2rem 1.5rem;
  margin-top: 0.5rem;
  width: 100%;
}
.xmas-img {
  background: none; border: none; padding: 0; cursor: pointer;
  width: 100%; max-width: 22rem;
}
.xmas-img img {
  width: 100%; height: auto; display: block;
  background: var(--card-deep);
}
.xmas-img:hover img { opacity: 0.9; }
.xmas-verse {
  font-family: var(--serif-display);
  font-style: italic;
  font-size: 1.05rem;
  color: var(--walnut-soft);
  text-align: center;
  margin-top: 1.8rem;
  line-height: 1.7;
}

.brass-rule {
  width: 100%; height: 1px;
  background: var(--brass);
  opacity: 0.55;
  margin: 1.4rem 0;
}

/* ---- telegram ---------------------------------------------------- */

.telegram-paper {
  background: var(--telegram);
  padding: 2rem 1.6rem;
  font-family: var(--mono);
  font-size: 0.86rem;
  line-height: 1.7;
  color: var(--ink);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  position: relative;
  width: 100%;
  background-image:
    repeating-linear-gradient(0deg,
      rgba(60,40,20,0.025) 0,
      rgba(60,40,20,0.025) 1px,
      transparent 1px,
      transparent 28px);
}
.telegram-head {
  display: flex;
  justify-content: space-between;
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  color: var(--brass);
  border-bottom: 1px solid rgba(60,40,20,0.18);
  padding-bottom: 0.7rem;
  margin-bottom: 1.1rem;
}
.telegram-routing {
  font-size: 0.72rem;
  color: var(--walnut-mute);
  margin-bottom: 1.1rem;
}
.telegram-to { margin-bottom: 1.4rem; }
.telegram-message {
  font-size: 1rem;
  line-height: 1.8;
  margin-bottom: 1.4rem;
}
.telegram-signed {
  text-align: right;
  font-size: 0.95rem;
}

/* ---- closing ----------------------------------------------------- */

.closing {
  text-align: center;
  padding: 4rem 0 4rem;
}
.closing-body {
  font-family: var(--serif-body);
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--walnut-soft);
  max-width: 33rem;
  margin: 0 auto;
  text-align: left;
  text-wrap: pretty;
}
.hairline-rule {
  width: 100%;
  height: 1px;
  background: var(--brass);
  opacity: 0.45;
  margin: 3rem auto;
  max-width: 32rem;
}
.dedication {
  font-family: var(--serif-display);
  font-style: italic;
  color: var(--walnut-mute);
  font-size: 1.05rem;
  margin: 2rem auto 0;
  letter-spacing: 0.01em;
}

/* ---- nav chrome -------------------------------------------------- */

.nav-chrome {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.4rem 2rem;
  z-index: 20;
  pointer-events: none;
  background: linear-gradient(to top, var(--paper) 35%, rgba(245,239,224,0));
  transition: background 0.4s ease;
}
body.body--navy .nav-chrome {
  background: linear-gradient(to top, var(--navy) 35%, rgba(31,45,61,0));
}
.nav-btn {
  pointer-events: auto;
  background: none;
  border: none;
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 0.95rem;
  letter-spacing: 0.04em;
  color: var(--walnut-mute);
  cursor: pointer;
  padding: 0.55rem 0.8rem;
  transition: color 0.18s, transform 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 0.55em;
}
.nav-btn:hover, .nav-btn:focus-visible {
  color: var(--ink);
  outline: none;
}
.nav-btn:hover .nav-arrow { transform: translateX(2px); }
.nav-btn.nav-prev:hover .nav-arrow { transform: translateX(-2px); }
.nav-btn:disabled {
  visibility: hidden;
  cursor: default;
}
.nav-arrow {
  font-style: normal;
  font-family: var(--serif-display);
  font-size: 1.3rem;
  color: var(--brass);
  transition: transform 0.2s ease;
  line-height: 1;
}
body.body--navy .nav-btn { color: var(--brass-faint); }
body.body--navy .nav-btn:hover, body.body--navy .nav-btn:focus-visible { color: var(--paper); }
body.body--navy .nav-arrow { color: var(--brass-soft); }

/* contents button — center bottom */
.toc-btn {
  pointer-events: auto;
  position: absolute;
  left: 50%;
  bottom: 1.45rem;
  transform: translateX(-50%);
  background: none;
  border: 1px solid rgba(155,123,63,0.4);
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 0.78rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--walnut-mute);
  cursor: pointer;
  padding: 0.45rem 1rem;
  border-radius: 1px;
  transition: color 0.18s, border-color 0.18s, background 0.18s;
}
.toc-btn:hover, .toc-btn:focus-visible {
  color: var(--ink);
  border-color: var(--brass);
  background: rgba(226,209,169,0.4);
  outline: none;
}
body.body--navy .toc-btn {
  color: var(--brass-faint);
  border-color: rgba(200, 172, 116, 0.35);
}
body.body--navy .toc-btn:hover {
  color: var(--paper);
  background: rgba(31,45,61,0.4);
  border-color: var(--brass-soft);
}

@media (max-width: 540px) {
  .nav-chrome { padding: 1rem 1.1rem; }
  .nav-btn { font-size: 0.86rem; padding: 0.4rem 0.55rem; }
  .toc-btn { font-size: 0.7rem; padding: 0.4rem 0.85rem; bottom: 1.05rem; }
}

/* ---- table of contents (overlay) --------------------------------- */

.toc-overlay {
  position: fixed;
  inset: 0;
  background: rgba(31, 27, 23, 0.78);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 90;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  animation: toc-fadein 0.3s ease;
  overflow-y: auto;
}
@keyframes toc-fadein { from { opacity: 0; } to { opacity: 1; } }

.toc-panel {
  background: var(--paper);
  max-width: 40rem;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 2.4rem clamp(1.5rem, 4vw, 2.8rem) 2.4rem;
  position: relative;
  box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  border: 1px solid rgba(155,123,63,0.3);
}
.toc-title {
  font-family: var(--serif-display);
  font-style: italic;
  font-size: 1.7rem;
  color: var(--ink);
  margin: 0 0 0.4rem;
  text-align: center;
}
.toc-sub {
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 0.78rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--brass);
  text-align: center;
  margin-bottom: 2rem;
}
.toc-section {
  margin-bottom: 1.6rem;
}
.toc-section-head {
  display: flex;
  align-items: baseline;
  gap: 0.7rem;
  font-family: var(--serif-display);
  font-style: italic;
  font-size: 1.15rem;
  color: var(--ink);
  margin-bottom: 0.7rem;
  border-bottom: 1px solid rgba(155,123,63,0.35);
  padding-bottom: 0.45rem;
}
.toc-section-numeral {
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--brass);
  font-style: italic;
  font-family: var(--serif-body);
}
.toc-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.toc-item {
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
  padding: 0.45rem 0.5rem;
  font-family: var(--serif-body);
  font-size: 0.95rem;
  color: var(--walnut-soft);
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  border-radius: 1px;
  transition: background 0.15s, color 0.15s;
}
.toc-item:hover, .toc-item:focus-visible {
  background: rgba(226,209,169,0.5);
  color: var(--ink);
  outline: none;
}
.toc-item.is-current {
  color: var(--ink);
  font-style: italic;
}
.toc-item.is-current::before {
  content: "›";
  color: var(--brass);
  margin-right: 0.2em;
}
.toc-num {
  font-variant-numeric: tabular-nums;
  font-size: 0.78rem;
  color: var(--brass);
  letter-spacing: 0.06em;
  min-width: 2.5em;
}
.toc-date {
  flex: 1;
  font-style: italic;
}
.toc-loc {
  font-size: 0.74rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--walnut-mute);
}
.toc-close {
  position: absolute;
  top: 0.9rem;
  right: 1rem;
  background: none;
  border: none;
  color: var(--walnut-mute);
  font-family: var(--serif-body);
  font-style: italic;
  cursor: pointer;
  font-size: 0.85rem;
  padding: 0.4rem 0.6rem;
  letter-spacing: 0.06em;
}
.toc-close:hover { color: var(--ink); }

.toc-entry {
  width: 100%;
  background: none;
  border: none;
  font: inherit;
  text-align: left;
  cursor: pointer;
  padding: 0.5rem 0.4rem;
  color: var(--walnut-soft);
  font-family: var(--serif-body);
  font-size: 0.95rem;
  display: flex; align-items: baseline; gap: 0.7rem;
  border-radius: 1px;
  transition: background 0.15s, color 0.15s;
}
.toc-entry:hover, .toc-entry:focus-visible {
  background: rgba(226,209,169,0.5);
  color: var(--ink);
  outline: none;
}
.toc-entry.is-current {
  color: var(--ink);
}
.toc-entry.is-current::after {
  content: "you are here";
  font-style: italic;
  font-size: 0.7rem;
  color: var(--brass);
  margin-left: auto;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ---- lightbox ---------------------------------------------------- */

.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(31, 45, 61, 0.96);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 2rem;
  animation: fadein 0.18s ease-out;
}
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

.lb-stage {
  max-width: min(900px, 92vw);
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.8rem;
}
.lb-stage img {
  max-width: 100%;
  max-height: 80vh;
  object-fit: contain;
  background: var(--card);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.lb-meta {
  font-family: var(--serif-body);
  color: var(--brass-faint);
  font-size: 0.82rem;
  letter-spacing: 0.05em;
  display: flex; gap: 1.5rem;
  font-style: italic;
}
.lb-counter {
  font-style: normal;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.72rem;
  color: var(--brass-soft);
}
.lb-close {
  position: absolute;
  top: 1.2rem; right: 1.5rem;
  background: none; border: none;
  color: var(--brass-faint);
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 0.95rem;
  cursor: pointer;
  letter-spacing: 0.04em;
  padding: 0.4rem 0.6rem;
}
.lb-close:hover { color: #fff; }
.lb-nav {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  background: none; border: none;
  color: var(--brass-faint);
  font-size: 3rem;
  font-family: var(--serif-display);
  cursor: pointer;
  padding: 0 1rem;
  line-height: 1;
}
.lb-prev { left: 1rem; }
.lb-next { right: 1rem; }
.lb-nav:hover { color: #fff; }

@media (max-width: 600px) {
  .lb-nav { font-size: 2rem; padding: 0 0.5rem; }
  .lb-close { top: 0.5rem; right: 0.8rem; }
}

/* ---- responsive -------------------------------------------------- */

@media (max-width: 540px) {
  body { font-size: 16px; }
  .archive { padding: 2.4rem 1.1rem 5.5rem; }
  .title-page { padding: 2.5rem 0; }
  .letter-body { padding: 1.8rem 1.3rem 1.6rem; font-size: 0.99rem; }
  .signature { font-size: 1.9rem; }
  .folio { font-size: 0.62rem; margin-bottom: 1.2rem; }
  .letter-head { margin-bottom: 1.2rem; }
}

/* ---- print -------------------------------------------------------- */

@media print {
  html, body { overflow: visible; height: auto; }
  .paper-grain, .atmosphere, .nav-chrome, .toc-btn, .photo-link, .lb-close, .lb-nav { display: none; }
  .stage { height: auto; overflow: visible; }
  .page-surface { position: static; box-shadow: none; }
  .archive { max-width: none; padding: 0; }
  .letter-card { page-break-inside: avoid; }
  .chapter-divider { page-break-before: always; }
}
</style>
</head>
