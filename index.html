<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Love, Always — The wartime letters of Raymond Eugene Lankford</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="A family archive of letters written by Raymond Eugene Lankford to Joan Northcutt, 1940." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Caveat:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" />

<style>
:root {
  --paper:        #F5EFE0;
  --paper-deep:   #EDE4CC;
  --card:         #ECE3D0;
  --card-deep:    #E3D6BB;
  --walnut:       #3B2A1A;
  --walnut-soft:  #5C4733;
  --walnut-mute:  #806852;
  --brass:        #9B7B3F;
  --brass-soft:   #C8AC74;
  --brass-faint:  #E2D1A9;
  --ink:          #1F1B17;
  --telegram:     #E8DDC4;
  --navy:         #1F2D3D;
  --navy-soft:    #2C4258;
  --navy-deep:    #15202C;
  --war-red:      #4A1418;
  --war-red-deep: #2E0A0D;

  --serif-display: "Cormorant Garamond", "EB Garamond", Garamond, serif;
  --serif-body:    "Source Serif 4", "Source Serif Pro", Georgia, serif;
  --hand:          "Caveat", "Homemade Apple", cursive;
  --mono:          "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --measure: 36rem;
}

* { box-sizing: border-box; }

html, body {
  background: var(--paper);
  margin: 0;
  padding: 0;
  /* Lock the viewport so the book stage owns scroll */
  overflow: hidden;
  height: 100%;
  transition: background 0.6s cubic-bezier(0.65, 0, 0.35, 1);
}
body {
  font-family: var(--serif-body);
  color: var(--walnut);
  font-size: 18px;
  line-height: 1.72;
  font-feature-settings: "kern", "onum", "liga", "dlig", "ss01";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Navy body when on a chapter divider page (set by App via classList) */
body.body--navy,
body.body--navy html { background: var(--navy); }
body.body--navy .stage { background: var(--navy); }

/* War body — Chapter IV "At War" divider. Deep oxblood with a subtle
   inward vignette so it reads as a layered field, not a flat block.
   Brass-faint text and chrome stays legible against it. */
body.body--war,
body.body--war html { background: var(--war-red); }
body.body--war .stage {
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, var(--war-red) 0%, var(--war-red-deep) 100%);
}
body.body--war .paper-grain { opacity: 0; }
body.body--war .nav-chrome {
  background: linear-gradient(to top, var(--war-red-deep) 35%, rgba(46,10,13,0));
}
body.body--war .nav-btn { color: var(--brass-faint); }
body.body--war .nav-btn:hover, body.body--war .nav-btn:focus-visible { color: var(--paper); }
body.body--war .nav-btn::after { background: var(--brass-soft); }
body.body--war .nav-arrow { color: var(--brass-soft); }
body.body--war .nav-btn:hover .nav-arrow { color: var(--paper); }
body.body--war .toc-btn {
  color: var(--brass-faint);
  border-color: rgba(200, 172, 116, 0.4);
}
body.body--war .toc-btn:hover {
  color: var(--paper);
  background: rgba(74,20,24,0.55);
  border-color: var(--brass-soft);
}
body.body--war .progress-track { background: rgba(200,172,116,0.18); }
body.body--war .progress-fill { background: var(--brass-soft); box-shadow: 0 0 6px rgba(200,172,116,0.5); }
body.body--war .folio { color: var(--brass-faint); }
body.body--war .folio::before, body.body--war .folio::after { background: var(--brass-soft); opacity: 0.45; }

/* paper grain — layered, with a faint vignette for depth */
.paper-grain {
  position: fixed; inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(155,123,63,0.07), transparent 55%),
    radial-gradient(ellipse at 90% 95%, rgba(60,40,20,0.07), transparent 50%),
    radial-gradient(ellipse 120% 100% at 50% 50%, transparent 55%, rgba(60,40,20,0.08) 100%);
  z-index: 1;
  transition: opacity 1.2s ease;
}
body.body--navy .paper-grain { opacity: 0; }

::selection { background: rgba(155,123,63,0.28); color: var(--ink); }

/* ---- atmospheric layer ------------------------------------------- */

.atmosphere {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  overflow: hidden;
  opacity: 0;
  transition: opacity 1.4s ease;
}
.atmosphere--on { opacity: 1; }

/* snow (great lakes) */
.snow-flake {
  position: absolute;
  top: -10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.55);
  box-shadow: 0 0 4px rgba(255,255,255,0.4);
  animation-name: snow-fall;
  animation-iteration-count: infinite;
  animation-timing-function: linear;
  will-change: transform;
}
@keyframes snow-fall {
  0%   { transform: translate3d(0, -10vh, 0) translateX(0); opacity: 0; }
  10%  { opacity: var(--snow-op, 0.55); }
  90%  { opacity: var(--snow-op, 0.55); }
  100% { transform: translate3d(var(--snow-drift, 40px), 110vh, 0); opacity: 0; }
}

/* dust motes (san diego) */
.dust-mote {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255, 220, 150, 0.7), rgba(200,160,80,0.05) 70%);
  filter: blur(0.3px);
  animation-name: dust-drift;
  animation-iteration-count: infinite;
  animation-timing-function: ease-in-out;
  will-change: transform;
}
@keyframes dust-drift {
  0%   { transform: translate3d(0,0,0); opacity: 0; }
  20%  { opacity: var(--dust-op, 0.45); }
  80%  { opacity: var(--dust-op, 0.45); }
  100% { transform: translate3d(var(--dust-x, 80px), var(--dust-y, -120px), 0); opacity: 0; }
}

/* sea horizon (pearl harbor) — subtle horizontal drift */
.sea-layer {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 120% 40% at 50% 65%, rgba(31, 45, 61, 0.18), transparent 70%),
    radial-gradient(ellipse 100% 22% at 50% 70%, rgba(155, 123, 63, 0.10), transparent 75%);
}
.sea-shimmer {
  position: absolute;
  bottom: 28%;
  left: -10%;
  right: -10%;
  height: 1px;
  background: linear-gradient(to right,
    transparent,
    rgba(226, 209, 169, 0.0) 20%,
    rgba(226, 209, 169, 0.55) 50%,
    rgba(226, 209, 169, 0.0) 80%,
    transparent);
  animation: sea-shimmer 9s ease-in-out infinite;
}
.sea-shimmer.s2 { bottom: 32%; animation-delay: 2.5s; animation-duration: 11s; opacity: 0.6; }
.sea-shimmer.s3 { bottom: 24%; animation-delay: 5s; animation-duration: 13s; opacity: 0.5; }
@keyframes sea-shimmer {
  0%, 100% { transform: translateX(-30px); opacity: 0; }
  50% { opacity: 0.7; }
  100% { transform: translateX(30px); opacity: 0; }
}

/* gentle palm-shadow sweep across the lower portion */
.sea-vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(31,45,61,0.18), transparent 70%);
  animation: sea-breathe 18s ease-in-out infinite;
}
@keyframes sea-breathe {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* ---- weather: rain / drizzle ----------------------------------- */
.rain-streak {
  position: absolute;
  top: -10vh;
  width: 1.5px;
  background: linear-gradient(to bottom,
    transparent 0%,
    rgba(31,45,61,0.0) 10%,
    rgba(31,45,61,0.7) 60%,
    rgba(31,45,61,0.0) 100%);
  animation-name: rain-fall;
  animation-iteration-count: infinite;
  animation-timing-function: linear;
  will-change: transform;
  transform: rotate(10deg);
  transform-origin: top;
  filter: blur(0.3px);
}
@keyframes rain-fall {
  0%   { transform: translate3d(0, -10vh, 0) rotate(10deg); opacity: 0; }
  10%  { opacity: var(--rain-op, 0.7); }
  90%  { opacity: var(--rain-op, 0.7); }
  100% { transform: translate3d(0, 120vh, 0) rotate(10deg); opacity: 0; }
}
/* atmospheric haze that accompanies rain so even-tempo letters feel wet */
.rain-mist {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 110% 70% at 50% -10%, rgba(31,45,61,0.10), transparent 65%),
    radial-gradient(ellipse 80% 50% at 50% 100%, rgba(31,45,61,0.06), transparent 60%);
  animation: rain-mist-pulse 14s ease-in-out infinite;
}
@keyframes rain-mist-pulse {
  0%, 100% { opacity: 0.8; }
  50%      { opacity: 1; }
}

/* ---- weather: fog / haze --------------------------------------- */
.fog-layer {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 90% 70% at 30% 50%, rgba(220,215,200,0.32), transparent 65%),
    radial-gradient(ellipse 80% 60% at 75% 60%, rgba(220,215,200,0.28), transparent 65%);
  animation: fog-drift 32s ease-in-out infinite;
}
.fog-layer.f2 { animation-duration: 48s; animation-direction: reverse; opacity: 0.7; }
@keyframes fog-drift {
  0%, 100% { transform: translate3d(-3%, 0, 0); opacity: 0.85; }
  50%      { transform: translate3d(3%, -1%, 0); opacity: 1; }
}

/* ---- weather: cloud shadows ------------------------------------ */
.cloud-shape {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.32), rgba(220,210,180,0.0) 70%);
  filter: blur(12px);
  animation-name: cloud-drift;
  animation-iteration-count: infinite;
  animation-timing-function: linear;
  will-change: transform;
}
@keyframes cloud-drift {
  0%   { transform: translate3d(-30vw, 0, 0); opacity: 0; }
  10%  { opacity: var(--cloud-op, 0.55); }
  90%  { opacity: var(--cloud-op, 0.55); }
  100% { transform: translate3d(130vw, 0, 0); opacity: 0; }
}

/* ---- weather: sun rays + warm light ---------------------------- */
.sun-glow {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 90% 60% at 50% -10%, rgba(255,228,170,0.35), transparent 55%),
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,210,140,0.22), transparent 50%);
  animation: sun-pulse 12s ease-in-out infinite;
}
@keyframes sun-pulse {
  0%, 100% { opacity: 0.85; }
  50%      { opacity: 1; }
}
.sun-ray {
  position: absolute;
  top: 0;
  width: 1px;
  height: 60vh;
  background: linear-gradient(to bottom, rgba(255,228,170,0.4), transparent 70%);
  transform-origin: top center;
  animation: ray-shimmer 9s ease-in-out infinite;
}
@keyframes ray-shimmer {
  0%, 100% { opacity: 0.0; }
  50%      { opacity: 0.45; }
}

/* ---- weather: thunderstorm flash ------------------------------- */
.lightning-flash {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 100% 40% at 50% 0%, rgba(255,255,235,0.65), transparent 55%);
  opacity: 0;
  animation: lightning 11s linear infinite;
  pointer-events: none;
}
@keyframes lightning {
  0%, 6%, 8%, 12%, 100% { opacity: 0; }
  6.5%  { opacity: 0.85; }
  7%    { opacity: 0.1; }
  7.5%  { opacity: 0.7; }
  8.5%  { opacity: 0; }
}

/* ---- weather: clear-night stars (rare for these dates) --------- */
.star-twinkle {
  position: absolute;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: rgba(226,209,169,0.85);
  box-shadow: 0 0 4px rgba(226,209,169,0.6);
  animation: twinkle 4s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50%      { opacity: 1; }
}

@media (prefers-reduced-motion: reduce) {
  .snow-flake, .dust-mote, .sea-shimmer, .sea-vignette,
  .rain-streak, .fog-layer, .cloud-shape, .sun-glow, .sun-ray,
  .lightning-flash, .star-twinkle {
    animation: none !important;
  }
}

/* ---- weather glyph on letter card ------------------------------ */
.weather-glyph {
  display: inline-flex;
  align-items: center;
  gap: 0.5em;
  font-family: var(--serif-body);
  font-style: normal;
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--walnut-mute);
  opacity: 0.85;
  font-weight: 500;
  margin-top: -0.1rem;
}
.weather-glyph svg {
  width: 11px; height: 11px;
  flex-shrink: 0;
  fill: none;
  stroke: var(--walnut-mute);
  stroke-width: 1.3;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: 0.85;
}
.weather-glyph .wg-temp { font-style: normal; color: var(--brass); font-weight: 600; letter-spacing: 0.06em; }

/* Pearl-Harbor countdown — quiet small-caps line that ties every letter
   to the date the reader knows is coming. Sits as one of the metadata
   details, not as a banner. Brass numerals + walnut-mute label so the
   number reads as the figure and 'days before Pearl Harbor' as the
   caption. */
.letter-countdown {
  font-family: var(--serif-body);
  font-size: 0.62rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--walnut-mute);
  font-weight: 500;
  opacity: 0.75;
  margin-top: -0.1rem;
  position: relative;
  padding-top: 0.4rem;
}
.letter-countdown::before {
  content: "";
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 14px;
  height: 1px;
  background: var(--brass);
  opacity: 0.5;
}

/* ---- book stage --------------------------------------------------- */

.stage {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  z-index: 3;
}

/* page surface — fills the viewport, scrolls internally.
   Transparent so the atmosphere layer (snow/rain/clouds/etc.) shows
   through; body bg supplies the page color. */
.page-surface {
  position: absolute;
  inset: 0;
  background: transparent;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
/* book-spine inset shadow lives on a separate fixed layer so it doesn't
   paint over the atmosphere */
.spine-shadow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 4;
  box-shadow: inset 18px 0 28px -18px rgba(60,40,20,0.18);
  transition: box-shadow 0.5s ease;
}
body.body--navy .spine-shadow { box-shadow: inset 18px 0 32px -18px rgba(0,0,0,0.5); }

/* ---- archive layout (inside each page surface) ------------------- */

.archive {
  position: relative;
  z-index: 1;
  max-width: 44rem;
  margin: 0 auto;
  padding: 3.2rem 1.5rem 6rem;
}
@media (min-width: 720px) {
  .archive { padding: 3.6rem 2.5rem 7rem; }
}

/* ---- folio (was "page-indicator") -------------------------------- */
/* Now lives INSIDE the scroll surface as a small folio mark up top.   */

.folio {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  width: 100%;
  font-family: var(--serif-body);
  font-style: normal;
  font-size: 0.66rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--walnut-mute);
  margin: 0 0 2rem;
  user-select: none;
  font-weight: 500;
}
.folio::before, .folio::after {
  content: "";
  display: inline-block;
  width: 24px;
  height: 1px;
  background: var(--brass);
  opacity: 0.4;
}
.folio .dot { color: var(--brass); margin: 0 0.55em; }
.folio-num { font-variant-numeric: tabular-nums; }
.is-navy .folio,
body.body--navy .folio { color: var(--brass-faint); }
body.body--navy .folio::before,
body.body--navy .folio::after { background: var(--brass-soft); opacity: 0.45; }

/* ---- title page -------------------------------------------------- */

.title-page {
  text-align: center;
  padding: 0;
  min-height: calc(100vh - 6rem);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  isolation: isolate;
}
.title-page::before {
  content: "";
  position: absolute;
  inset: -3rem;
  z-index: -1;
  background:
    radial-gradient(ellipse 60% 60% at 50% 50%, rgba(245,239,224,1) 0%, rgba(245,239,224,0.0) 70%),
    radial-gradient(ellipse 100% 80% at 50% 50%, transparent 40%, rgba(91,71,51,0.10) 100%);
  pointer-events: none;
}

.title-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.6rem;
}
.title-hero .ornament { margin-bottom: 0.4rem; width: min(20rem, 62vw); }

/* Locator below the names — Stanford / ✦ / U.S.S. New Orleans stacked
   on three centered rows so the place names are always axis-aligned,
   independent of viewport width. Reads like a chart label. */
.title-locator {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.55rem;
  font-family: var(--serif-body);
  font-size: 0.7rem;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--walnut-mute);
  font-weight: 500;
  margin: 0.6rem 0 0;
  text-align: center;
}
.title-locator .locator-mark {
  font-family: var(--serif-display);
  font-size: 0.62rem;
  color: var(--brass);
  letter-spacing: 0;
  opacity: 0.75;
  line-height: 1;
}

.title-eyebrow {
  font-family: var(--serif-body);
  font-style: normal;
  font-size: 0.72rem;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--brass);
  margin-bottom: 2.6rem;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 1.1rem;
}
.title-eyebrow::before,
.title-eyebrow::after {
  content: "";
  display: inline-block;
  width: 32px; height: 1px;
  background: var(--brass);
  opacity: 0.6;
}

.title {
  font-family: var(--serif-display);
  font-weight: 500;
  font-size: clamp(3.6rem, 10vw, 6.6rem);
  line-height: 1;
  letter-spacing: -0.022em;
  color: var(--ink);
  margin: 0;
  font-style: italic;
  font-variation-settings: "opsz" 60;
}

.subtitle {
  font-family: var(--serif-display);
  font-style: italic;
  font-weight: 400;
  font-size: clamp(1.05rem, 2.1vw, 1.2rem);
  line-height: 1.7;
  color: var(--walnut-soft);
  max-width: 32rem;
  margin: 0;
  letter-spacing: 0.04em;
}

.ornament {
  display: flex;
  align-items: center;
  gap: 1.4rem;
  width: min(22rem, 64vw);
  margin: 0 auto 2.6rem;
}
.ornament-rule {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--brass) 50%, transparent);
  opacity: 0.85;
}
.ornament-anchor { width: 56px; height: 56px; flex-shrink: 0; }

.frontispiece {
  font-family: var(--serif-body);
  font-style: italic;
  color: var(--walnut-mute);
  font-size: 0.98rem;
  line-height: 1.7;
  margin: 0 0 3.6rem;
  max-width: 26rem;
}

.title-count {
  font-family: var(--serif-display);
  font-style: italic;
  color: var(--walnut-mute);
  font-size: 0.98rem;
  line-height: 1.65;
  margin: 0;
  letter-spacing: 0.01em;
}

.title-prompt {
  margin-top: 3.2rem;
  font-family: var(--serif-body);
  font-style: normal;
  font-size: 0.72rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--brass);
  display: inline-flex;
  align-items: center;
  gap: 0.7em;
  background: none;
  border: none;
  padding: 0.45rem 0;
  cursor: pointer;
  font-weight: 500;
  border-bottom: 1px solid transparent;
  transition: color 0.25s ease, border-color 0.25s ease, gap 0.25s ease;
}
.title-prompt::after {
  content: "→";
  font-family: var(--serif-display);
  font-size: 1.05rem;
  letter-spacing: 0;
  transition: transform 0.3s cubic-bezier(0.65, 0, 0.35, 1);
  display: inline-block;
}
.title-prompt:hover, .title-prompt:focus-visible {
  color: var(--ink);
  border-bottom-color: var(--brass);
  outline: none;
  gap: 1em;
}
.title-prompt:hover::after,
.title-prompt:focus-visible::after { transform: translateX(4px); }

/* ---- chapter divider --------------------------------------------- */

.chapter-divider {
  text-align: center;
  padding: 2rem 0 4rem;
  min-height: calc(100vh - 8rem);
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0;
  position: relative;
  isolation: isolate;
}


/* huge translucent roman numeral — sits behind the title block.
   Pinned high so it doesn't bleed through the bridge prose lower on the
   spread; horizontally centered across the page. */
.chapter-watermark {
  position: absolute;
  top: clamp(2rem, 8vh, 6rem);
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  pointer-events: none;
  z-index: -1;
}
.chapter-watermark-text {
  font-family: var(--serif-display);
  font-style: italic;
  font-weight: 500;
  font-size: clamp(11rem, 22vw, 18rem);
  line-height: 1;
  color: rgba(226, 209, 169, 0.07);
  letter-spacing: -0.04em;
  user-select: none;
}

.chapter-numeral {
  font-family: var(--serif-body);
  font-style: normal;
  font-size: 0.74rem;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  color: var(--brass-soft);
  margin-bottom: 1.5rem;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
}
.chapter-numeral::before,
.chapter-numeral::after {
  content: "";
  display: inline-block;
  width: 28px; height: 1px;
  background: var(--brass-soft);
  opacity: 0.55;
}
.chapter-title {
  font-family: var(--serif-display);
  font-style: italic;
  font-weight: 500;
  font-size: clamp(3rem, 7.4vw, 4.8rem);
  color: var(--paper);
  margin: 0 0 0.7rem;
  letter-spacing: -0.018em;
  line-height: 1.05;
  font-variation-settings: "opsz" 60;
}
.chapter-loc {
  font-family: var(--serif-display);
  font-size: 1.1rem;
  font-style: italic;
  color: var(--brass-faint);
  margin-bottom: 0.4rem;
}
.chapter-dates {
  font-family: var(--serif-body);
  font-style: normal;
  font-size: 0.74rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--brass-soft);
}

.chapter-bridge {
  font-family: var(--serif-display);
  font-style: italic;
  font-size: 1.16rem;
  line-height: 1.7;
  color: var(--brass-faint);
  max-width: 32rem;
  margin: 0.6rem auto 1.4rem;
  text-align: justify;
  text-align-last: left;
  hyphens: auto;
  -webkit-hyphens: auto;
  padding: 0 1rem;
}

/* ---- route diagram ----------------------------------------------- */

.route-wrap {
  margin: 1.8rem auto 1rem;
  max-width: 38rem;
  width: 100%;
  padding: 0 1rem;
}
.route-svg {
  width: 100%;
  height: auto;
  display: block;
  overflow: visible;
}
.route-line {
  stroke: var(--brass-soft);
  stroke-width: 1.2;
  stroke-dasharray: 1 7;
  opacity: 0.7;
  fill: none;
  stroke-linecap: round;
}
.route-pin-active {
  fill: var(--brass-soft);
  stroke: var(--brass-soft);
  stroke-width: 1;
}
.route-pin-active-halo {
  fill: none;
  stroke: var(--brass-soft);
  stroke-width: 1;
  opacity: 0.5;
  transform-origin: center;
  animation: route-pulse 3.4s ease-in-out infinite;
}
@keyframes route-pulse {
  0%, 100% { r: 11; opacity: 0.0; }
  50% { r: 16; opacity: 0.55; }
}
.route-pin-inactive {
  fill: var(--navy);
  stroke: var(--brass-soft);
  stroke-width: 1.2;
  opacity: 0.85;
}
.route-label {
  font-family: var(--serif-body);
  font-size: 13px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  fill: var(--brass-faint);
  font-weight: 500;
}
.route-label--active {
  fill: var(--paper);
  font-weight: 500;
}
.route-label-rule {
  stroke: var(--brass-soft);
  stroke-width: 1;
  opacity: 0.65;
}
.route-date {
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 11px;
  letter-spacing: 0.04em;
  fill: var(--brass-soft);
}

@media (prefers-reduced-motion: reduce) {
  .route-pin-active-halo { animation: none !important; r: 11; opacity: 0.4; }
}

/* ---- emphasis (scroll-triggered underline) ---------------------- */
/* Wraps a phrase that earns weight. A brass underline draws in once
   when the line scrolls into the viewport (IntersectionObserver flips
   .is-revealed). After that it stays underlined; subsequent scroll-bys
   do nothing — preserves the gesture. */
.emphasis {
  position: relative;
  display: inline;
  background-image: linear-gradient(var(--brass), var(--brass));
  background-repeat: no-repeat;
  background-position: 0 100%;
  background-size: 0% 1.5px;
  padding-bottom: 0.12em;
  transition: background-size 1.6s cubic-bezier(0.65, 0, 0.35, 1);
}
.emphasis.is-revealed {
  background-size: 100% 1.5px;
}
body.body--war .emphasis {
  background-image: linear-gradient(var(--brass-soft), var(--brass-soft));
}
@media (prefers-reduced-motion: reduce) {
  .emphasis {
    background-size: 100% 1.5px;
    transition: none;
  }
}

/* ---- letter card ------------------------------------------------- */

.letter-card {
  margin: 0 auto;
  max-width: var(--measure);
  padding: 0;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.letter-head {
  text-align: center;
  margin-bottom: 2rem;
  width: 100%;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.55rem;
}
/* Reserve horizontal margin on the centered text content so it never
   runs under the absolute-positioned postmark on the right. The empty
   space mirrors on the left to keep the date/stamp visually centered. */
.letter-head .letter-num,
.letter-head .letter-stamp,
.letter-head .weather-glyph {
  max-width: calc(100% - 11rem);
}
@media (max-width: 540px) {
  .letter-head .letter-num,
  .letter-head .letter-stamp,
  .letter-head .weather-glyph {
    max-width: calc(100% - 9rem);
  }
}
.letter-eyebrow {
  font-family: var(--serif-body);
  font-size: 0.66rem;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--navy);
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 0.7em;
  opacity: 0.85;
}
.letter-eyebrow::before,
.letter-eyebrow::after {
  content: "";
  display: inline-block;
  width: 14px; height: 1px;
  background: var(--navy);
  opacity: 0.55;
}
.letter-num {
  font-family: var(--serif-display);
  font-style: italic;
  font-size: 1.32rem;
  color: var(--navy-deep);
  letter-spacing: 0.005em;
}
.letter-num .dot {
  color: var(--navy);
  margin: 0 0.4em;
  font-style: normal;
}
.letter-stamp {
  font-family: var(--serif-body);
  font-size: 0.66rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--navy);
  font-weight: 500;
  opacity: 0.7;
  max-width: 28rem;
  text-align: center;
  line-height: 1.5;
}

/* postmark — circular seal in the top-right of every letter header.
   Two-color ink: brass rings (warm, aged) + navy text (legible). Slight
   rotation for the hand-stamped feel. Mix-blend-mode multiply lets it
   read like ink on cream paper. */
.postmark {
  position: absolute;
  top: -0.3rem;
  right: 0;
  width: 76px;
  height: 76px;
  display: block;
  pointer-events: none;
  opacity: 0.85;
  transform: rotate(-5deg);
  mix-blend-mode: multiply;
}
.postmark .pm-ring-outer,
.postmark .pm-ring-mid,
.postmark .pm-ring-inner { fill: none; }
.postmark .pm-ring-outer { stroke: var(--brass); stroke-width: 1.6; opacity: 0.95; }
.postmark .pm-ring-mid   { stroke: var(--brass); stroke-width: 0.5; opacity: 0.6; stroke-dasharray: 0.6 1.4; }
.postmark .pm-ring-inner { stroke: var(--brass); stroke-width: 0.9; opacity: 0.85; }
.postmark .pm-cancel     { stroke: var(--brass); stroke-width: 1.6; opacity: 0.7; stroke-linecap: round; }
.postmark .pm-arc-text {
  fill: var(--navy);
  font-family: var(--serif-body);
  font-weight: 600;
  letter-spacing: 0.16em;
}
.postmark .pm-month {
  font-family: var(--serif-display);
  font-style: italic;
  font-weight: 500;
  font-size: 7.8px;
  fill: var(--navy);
  opacity: 0.85;
}
.postmark .pm-day {
  font-family: var(--serif-display);
  font-style: italic;
  font-weight: 500;
  font-size: 15px;
  fill: var(--navy);
}
@media (max-width: 540px) {
  .postmark { width: 62px; height: 62px; top: -0.1rem; }
}

.letter-body {
  background: var(--card);
  padding: 2.8rem clamp(1.6rem, 4vw, 3.1rem) 2.4rem;
  border-radius: 2px;
  position: relative;
  font-family: var(--serif-body);
  font-size: 1.02rem;
  line-height: 1.78;
  color: var(--walnut);
  text-align: justify;
  text-align-last: left;
  text-justify: inter-word;
  hyphens: auto;
  -webkit-hyphens: auto;
  -ms-hyphens: auto;
  hyphenate-limit-chars: 6 3 3;
  word-spacing: -0.01em;
  width: 100%;
  border: 1px solid rgba(31,45,61,0.18);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.4) inset,
    0 0 0 1px rgba(155,123,63,0.08),
    0 14px 32px -14px rgba(31,45,61,0.22),
    0 3px 8px rgba(60,40,20,0.07);
  background-image:
    radial-gradient(ellipse 80% 60% at 22% 14%, rgba(31,45,61,0.04), transparent 70%),
    radial-gradient(ellipse 60% 50% at 82% 92%, rgba(60,40,20,0.05), transparent 70%);
}
/* binding rule on top — navy ink with brass glints */
.letter-body::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background:
    linear-gradient(90deg,
      transparent 0%,
      rgba(31,45,61,0.0) 6%,
      rgba(31,45,61,0.55) 22%,
      rgba(155,123,63,0.7) 50%,
      rgba(31,45,61,0.55) 78%,
      rgba(31,45,61,0.0) 94%,
      transparent 100%);
  pointer-events: none;
}
/* second hairline rule for depth */
.letter-body::after {
  content: "";
  position: absolute;
  top: 6px; left: 12%; right: 12%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(31,45,61,0.22) 50%, transparent);
  pointer-events: none;
}

.salutation {
  font-family: var(--serif-display);
  font-style: italic;
  font-size: 1.45rem;
  color: var(--navy-deep);
  margin-bottom: 1rem;
  letter-spacing: 0.005em;
  font-weight: 500;
}

.letter-body p {
  margin: 0 0 1.15rem;
}
.letter-body p:last-of-type { margin-bottom: 0; }

/* drop cap — fixed-slot span the first paragraph carves out, so the
   reserved width and baseline are identical regardless of which letter
   appears (an "I" no longer sits in a narrow gutter while a "T" hangs
   over the next line). The actual letter is a real <span>; CSS
   ::first-letter doesn't accept width/text-align reliably. */
.letter-body .has-dropcap { /* paragraph hook — nothing structural needed */ }
.letter-body .dropcap {
  float: left;
  display: inline-block;
  width: 0.92em;
  text-align: center;
  font-family: var(--serif-display);
  font-style: italic;
  font-weight: 500;
  font-size: 3.7em;
  line-height: 0.86;
  color: var(--navy);
  margin: 0.05em 0.18em -0.02em 0;
  padding: 0;
  text-shadow: 0 1px 0 rgba(255,255,255,0.4);
}

.signature {
  font-family: var(--hand);
  font-size: 2.5rem;
  color: var(--navy-deep);
  margin: 1.8rem 0 0.5rem;
  line-height: 1;
  letter-spacing: 0.005em;
  position: relative;
  display: inline-block;
}
.signature::after {
  content: "";
  display: block;
  width: 86px;
  height: 8px;
  margin-top: 0.25rem;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 86 8'><path d='M 1 4 Q 14 1 30 4 T 58 4 T 85 4' fill='none' stroke='%231F2D3D' stroke-width='0.9' stroke-linecap='round' opacity='0.55'/></svg>");
  background-repeat: no-repeat;
  background-size: contain;
}
.signature--xmas { text-align: center; margin-top: 1.2rem; }
.signature--xmas::after { margin-left: auto; margin-right: auto; }

.postscript {
  font-size: 0.95rem;
  color: var(--walnut-soft);
  margin-top: 1.4rem;
  font-style: italic;
  padding-top: 1rem;
  border-top: 1px solid rgba(31,45,61,0.12);
}
.ps-mark {
  font-style: normal;
  font-variant: small-caps;
  letter-spacing: 0.08em;
  color: var(--navy);
  margin-right: 0.4em;
  font-weight: 600;
}
.ps-mark::before {
  content: "·";
  color: var(--brass);
  margin-right: 0.4em;
}

.incomplete-marker {
  font-style: italic;
  color: var(--walnut-mute);
  text-align: center;
  margin: 1.5rem 0 0;
  font-size: 0.92rem;
  letter-spacing: 0.04em;
}

.uncertain {
  font-size: 0.62em;
  color: var(--walnut-mute);
  vertical-align: sub;
  margin: 0 0.05em;
  font-style: italic;
}

.letter-note {
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 0.9rem;
  color: var(--walnut-mute);
  text-align: justify;
  text-align-last: left;
  hyphens: auto;
  -webkit-hyphens: auto;
  margin: 1.4rem auto 0;
  max-width: 30rem;
  line-height: 1.65;
}
/* Consecutive notes are paragraphs of one block, not separate notes —
   tighten the top margin so they read together. */
.letter-note + .letter-note { margin-top: 0.8rem; }

/* ---- photo link -------------------------------------------------- */

.photo-link {
  background: none;
  border: none;
  font-family: var(--serif-body);
  font-style: italic;
  color: var(--navy);
  font-size: 0.98rem;
  cursor: pointer;
  display: inline-flex;
  align-items: baseline;
  gap: 0.8em;
  margin: 1.6rem auto 0;
  padding: 0.5em 0.1em;
  letter-spacing: 0.005em;
  position: relative;
  transition: color 0.25s ease;
  text-align: center;
  font-weight: 500;
}
.photo-link::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0.2em;
  height: 1px;
  background: var(--navy);
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform 0.32s cubic-bezier(0.65, 0, 0.35, 1);
}
.photo-link:hover, .photo-link:focus-visible {
  color: var(--navy-deep);
  outline: none;
}
.photo-link:hover::after, .photo-link:focus-visible::after { transform: scaleX(1); }
.photo-link-meta {
  font-style: normal;
  font-size: 0.68rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--brass);
  font-weight: 500;
}

/* ---- envelope card ----------------------------------------------- */

.envelope-stage {
  width: 100%;
  display: flex;
  justify-content: center;
  margin: 0.8rem 0 1.2rem;
}
.envelope-img {
  background: var(--card);
  border: 1px solid rgba(155,123,63,0.22);
  padding: 14px;
  cursor: pointer;
  width: 100%;
  max-width: 28rem;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.4) inset,
    0 12px 28px -12px rgba(60,40,20,0.2),
    0 2px 6px rgba(60,40,20,0.06);
  transition: transform 0.32s cubic-bezier(0.65, 0, 0.35, 1), box-shadow 0.32s ease;
}
.envelope-img:hover, .envelope-img:focus-visible {
  transform: translateY(-3px);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.4) inset,
    0 18px 36px -12px rgba(60,40,20,0.25),
    0 4px 10px rgba(60,40,20,0.08);
  outline: none;
}
.envelope-img img {
  width: 100%; height: auto; display: block;
  background: var(--card-deep);
  filter: sepia(0.12) saturate(0.92);
  transition: opacity 0.25s ease;
}

.envelope-note { color: var(--walnut-soft); }

/* ---- christmas card ---------------------------------------------- */

.letter-card--xmas .letter-head { margin-top: 0.4rem; }
.xmas-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--card);
  padding: 2.4rem 1.8rem 2rem;
  margin-top: 0.5rem;
  width: 100%;
  border: 1px solid rgba(155,123,63,0.2);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.4) inset,
    0 12px 28px -12px rgba(60,40,20,0.18),
    0 2px 6px rgba(60,40,20,0.06);
  position: relative;
}
.xmas-stage::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(155,123,63,0.25);
  pointer-events: none;
}
.xmas-img {
  background: var(--paper);
  border: none;
  padding: 8px;
  cursor: pointer;
  width: 100%;
  max-width: 22rem;
  box-shadow: 0 4px 14px -4px rgba(60,40,20,0.18);
  transition: transform 0.32s cubic-bezier(0.65, 0, 0.35, 1);
}
.xmas-img:hover, .xmas-img:focus-visible {
  transform: translateY(-2px);
  outline: none;
}
.xmas-img img {
  width: 100%; height: auto; display: block;
  background: var(--card-deep);
}
.xmas-verse {
  font-family: var(--serif-display);
  font-style: italic;
  font-size: 1.1rem;
  color: var(--walnut-soft);
  text-align: center;
  margin-top: 2rem;
  line-height: 1.75;
  position: relative;
  padding: 1rem 0 0;
}
.xmas-verse::before {
  content: "";
  display: block;
  width: 48px;
  height: 1px;
  background: var(--brass);
  opacity: 0.55;
  margin: 0 auto 1.2rem;
}
.xmas-cartouche {
  font-family: var(--serif-body);
  font-size: 0.66rem;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  color: var(--brass);
  margin-top: 1.4rem;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 0.8rem;
}
.xmas-cartouche::before,
.xmas-cartouche::after {
  content: "";
  display: inline-block;
  width: 18px; height: 1px;
  background: var(--brass);
  opacity: 0.6;
}

.brass-rule {
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--brass) 50%, transparent);
  opacity: 0.7;
  margin: 1.6rem 0;
}

/* ---- telegram ---------------------------------------------------- */

.telegram-paper {
  background: var(--telegram);
  padding: 2.2rem 1.8rem 1.9rem;
  font-family: var(--mono);
  font-size: 0.88rem;
  line-height: 1.7;
  color: var(--ink);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  position: relative;
  width: 100%;
  border: 1px solid rgba(31,45,61,0.4);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.4) inset,
    0 12px 28px -12px rgba(60,40,20,0.22),
    0 2px 6px rgba(60,40,20,0.08);
  background-image:
    repeating-linear-gradient(0deg,
      rgba(60,40,20,0.06) 0,
      rgba(60,40,20,0.06) 1px,
      transparent 1px,
      transparent 26px),
    radial-gradient(ellipse 80% 100% at 50% 0%, rgba(31,45,61,0.05), transparent 60%);
}
/* corner chevron decorations */
.telegram-paper::before,
.telegram-paper::after {
  content: "";
  position: absolute;
  width: 14px; height: 14px;
  border: 1px solid var(--navy);
  pointer-events: none;
}
.telegram-paper::before { top: 6px; left: 6px; border-right: none; border-bottom: none; }
.telegram-paper::after  { top: 6px; right: 6px; border-left: none; border-bottom: none; }

.telegram-letterhead {
  position: absolute;
  top: 0.5rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--serif-display);
  font-style: italic;
  font-size: 0.62rem;
  letter-spacing: 0.4em;
  color: var(--navy);
  opacity: 0.35;
  text-transform: uppercase;
  white-space: nowrap;
}

.telegram-head {
  display: flex;
  justify-content: space-between;
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  color: var(--navy);
  border-bottom: 1px solid rgba(31,45,61,0.3);
  padding: 0.4rem 0 0.8rem;
  margin-bottom: 1.2rem;
  font-weight: 500;
}
.telegram-routing {
  font-size: 0.72rem;
  color: var(--walnut-mute);
  margin-bottom: 1.1rem;
  letter-spacing: 0.06em;
}
.telegram-to { margin-bottom: 1.4rem; }
.telegram-message {
  font-size: 1rem;
  line-height: 1.85;
  margin-bottom: 1.4rem;
  color: var(--navy-deep);
  font-weight: 500;
}
.telegram-signed {
  text-align: right;
  font-size: 0.95rem;
  color: var(--navy);
  font-weight: 500;
}

/* ---- closing ----------------------------------------------------- */

.closing {
  text-align: center;
  padding: 4rem 0 4rem;
}
.closing-body {
  font-family: var(--serif-body);
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--walnut-soft);
  max-width: 33rem;
  margin: 0 auto;
  text-align: justify;
  text-align-last: left;
  hyphens: auto;
  -webkit-hyphens: auto;
}
.hairline-rule {
  width: 100%;
  height: 1px;
  background: var(--brass);
  opacity: 0.45;
  margin: 3rem auto;
  max-width: 32rem;
}
.dedication {
  font-family: var(--serif-display);
  font-style: italic;
  color: var(--walnut-mute);
  font-size: 1.05rem;
  margin: 2rem auto 0;
  letter-spacing: 0.01em;
}

/* ---- nav chrome -------------------------------------------------- */

.nav-chrome {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.4rem 2rem;
  z-index: 20;
  pointer-events: none;
  background: linear-gradient(to top, var(--paper) 35%, rgba(245,239,224,0));
  transition: background 0.4s ease;
}
body.body--navy .nav-chrome {
  background: linear-gradient(to top, var(--navy) 35%, rgba(31,45,61,0));
}
.nav-btn {
  pointer-events: auto;
  background: none;
  border: none;
  font-family: var(--serif-body);
  font-style: normal;
  font-size: 0.7rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--walnut-mute);
  cursor: pointer;
  padding: 0.7rem 0.4rem;
  transition: color 0.25s ease;
  display: inline-flex;
  align-items: center;
  gap: 0.7em;
  position: relative;
  font-weight: 500;
}
.nav-btn::after {
  content: "";
  position: absolute;
  left: 0.4rem;
  right: 0.4rem;
  bottom: 0.45rem;
  height: 1px;
  background: var(--brass);
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform 0.32s cubic-bezier(0.65, 0, 0.35, 1);
}
.nav-btn.nav-prev::after { transform-origin: right center; }
.nav-btn:hover, .nav-btn:focus-visible {
  color: var(--ink);
  outline: none;
}
.nav-btn:hover::after, .nav-btn:focus-visible::after { transform: scaleX(1); }
.nav-btn:hover .nav-arrow { transform: translateX(4px); }
.nav-btn.nav-prev:hover .nav-arrow { transform: translateX(-4px); }
.nav-btn:disabled {
  visibility: hidden;
  cursor: default;
}
.nav-arrow {
  font-style: normal;
  font-family: var(--serif-display);
  font-size: 1.4rem;
  color: var(--brass);
  transition: transform 0.32s cubic-bezier(0.65, 0, 0.35, 1), color 0.25s ease;
  line-height: 1;
}
.nav-btn:hover .nav-arrow { color: var(--ink); }
body.body--navy .nav-btn { color: var(--brass-faint); }
body.body--navy .nav-btn:hover, body.body--navy .nav-btn:focus-visible { color: var(--paper); }
body.body--navy .nav-btn::after { background: var(--brass-soft); }
body.body--navy .nav-arrow { color: var(--brass-soft); }
body.body--navy .nav-btn:hover .nav-arrow { color: var(--paper); }

/* contents button — center bottom */
.toc-btn {
  pointer-events: auto;
  position: absolute;
  left: 50%;
  bottom: 1.5rem;
  transform: translateX(-50%);
  background: none;
  border: 1px solid rgba(155,123,63,0.45);
  font-family: var(--serif-body);
  font-style: normal;
  font-size: 0.7rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--walnut-mute);
  cursor: pointer;
  padding: 0.55rem 1.3rem;
  border-radius: 2px;
  transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease, letter-spacing 0.3s ease;
  font-weight: 500;
}
.toc-btn:hover, .toc-btn:focus-visible {
  color: var(--ink);
  border-color: var(--brass);
  background: rgba(226,209,169,0.5);
  letter-spacing: 0.3em;
  outline: none;
}
body.body--navy .toc-btn {
  color: var(--brass-faint);
  border-color: rgba(200, 172, 116, 0.4);
}
body.body--navy .toc-btn:hover {
  color: var(--paper);
  background: rgba(44,66,88,0.55);
  border-color: var(--brass-soft);
}

@media (max-width: 540px) {
  .nav-chrome { padding: 1rem 1.1rem; }
  .nav-btn { font-size: 0.86rem; padding: 0.4rem 0.55rem; }
  .toc-btn { font-size: 0.7rem; padding: 0.4rem 0.85rem; bottom: 1.05rem; }
}

/* ---- table of contents (side drawer) ---------------------------- */

.toc-overlay {
  position: fixed;
  inset: 0;
  background: rgba(21, 32, 44, 0.42);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  z-index: 90;
  animation: toc-fadein 0.32s cubic-bezier(0.65, 0, 0.35, 1);
}
@keyframes toc-fadein { from { opacity: 0; } to { opacity: 1; } }

.toc-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: min(480px, 100vw);
  background: var(--paper);
  overflow-y: auto;
  padding: 2.6rem clamp(1.4rem, 3.5vw, 2.4rem) 5rem;
  box-shadow:
    -2px 0 0 rgba(155,123,63,0.18),
    -24px 0 64px rgba(0,0,0,0.28);
  animation: toc-slidein 0.42s cubic-bezier(0.65, 0, 0.35, 1);
  background-image:
    radial-gradient(ellipse at 80% 0%, rgba(155,123,63,0.06), transparent 55%),
    radial-gradient(ellipse at 20% 100%, rgba(60,40,20,0.05), transparent 55%);
}
@keyframes toc-slidein {
  from { transform: translateX(100%); }
  to   { transform: translateX(0); }
}
@media (prefers-reduced-motion: reduce) {
  .toc-panel { animation: none; }
}

.toc-header {
  position: sticky;
  top: -2.6rem;
  margin: -2.6rem -2.4rem 1.6rem;
  padding: 2rem 2.4rem 1.2rem;
  background: var(--paper);
  border-bottom: 1px solid rgba(155,123,63,0.22);
  z-index: 1;
}
.toc-header-eyebrow {
  font-family: var(--serif-body);
  font-size: 0.66rem;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--brass);
  font-weight: 500;
  margin-bottom: 0.6rem;
}
.toc-title {
  font-family: var(--serif-display);
  font-style: italic;
  font-weight: 500;
  font-size: 2rem;
  color: var(--ink);
  margin: 0 0 0.4rem;
  letter-spacing: -0.01em;
}
.toc-sub {
  font-family: var(--serif-body);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--walnut-mute);
}
.toc-section {
  margin-bottom: 1.8rem;
}
.toc-section-head {
  display: flex;
  align-items: baseline;
  gap: 0.7rem;
  font-family: var(--serif-display);
  font-style: italic;
  font-weight: 500;
  font-size: 1.32rem;
  color: var(--navy-deep);
  margin-bottom: 0.7rem;
  background: none;
  border: none;
  border-bottom: 1px solid rgba(31,45,61,0.22);
  padding: 0.6rem 0.3rem 0.55rem;
  width: 100%;
  cursor: pointer;
  text-align: left;
  font: inherit;
  transition: color 0.22s ease, border-color 0.22s ease;
}
.toc-section-head .toc-section-numeral,
.toc-section-head .toc-section-loc {
  font: inherit;
  font-family: var(--serif-body);
  font-style: normal;
}
.toc-section-head .toc-section-numeral {
  font-size: 0.66rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--navy);
  font-weight: 500;
  min-width: 4em;
  flex-shrink: 0;
}
.toc-section-head .toc-section-title {
  flex: 1;
  font-family: var(--serif-display);
  font-style: italic;
  font-weight: 500;
  font-size: 1.32rem;
  color: var(--navy-deep);
}
.toc-section-head .toc-section-loc {
  font-size: 0.66rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--brass);
  font-weight: 500;
}
.toc-section-head:hover {
  color: var(--ink);
  border-bottom-color: var(--brass);
}
.toc-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.toc-item {
  display: flex;
  align-items: flex-start;
  gap: 0.85rem;
  padding: 0.7rem 0.7rem 0.7rem 0.55rem;
  font-family: var(--serif-body);
  font-size: 0.94rem;
  color: var(--walnut-soft);
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  border-left: 2px solid transparent;
  transition: background 0.22s ease, color 0.22s ease, border-color 0.22s ease, padding-left 0.28s cubic-bezier(0.65, 0, 0.35, 1);
}
.toc-item:hover, .toc-item:focus-visible {
  background: rgba(226,209,169,0.42);
  color: var(--ink);
  padding-left: 0.85rem;
  outline: none;
}
.toc-item.is-current {
  color: var(--ink);
  background: rgba(226,209,169,0.45);
  border-left-color: var(--brass);
  padding-left: 0.85rem;
}
.toc-item .toc-status,
.toc-item .toc-num {
  flex-shrink: 0;
  margin-top: 0.42em;
}
.toc-meta {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 0.18rem;
  align-items: flex-start;
}
.toc-meta .toc-date {
  font-style: italic;
  font-size: 0.96rem;
  color: inherit;
  white-space: nowrap;
}
.toc-meta .toc-loc {
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--walnut-mute);
  font-weight: 500;
  line-height: 1.4;
}
.toc-status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1px solid var(--brass);
}
.toc-status--transcribed { background: var(--brass); }
.toc-status--draft { background: transparent; }
.toc-status--envelope { background: var(--walnut-mute); border-color: var(--walnut-mute); }
.toc-status--special { background: var(--navy); border-color: var(--navy); }
.toc-num {
  font-variant-numeric: tabular-nums;
  font-family: var(--mono);
  font-size: 0.74rem;
  color: var(--brass);
  letter-spacing: 0.04em;
  min-width: 2em;
  font-weight: 500;
}
.toc-date {
  flex: 1;
  font-style: italic;
  font-size: 0.95rem;
}
.toc-loc {
  font-size: 0.66rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--walnut-mute);
  font-weight: 500;
}
.toc-close {
  position: absolute;
  top: 1rem;
  right: 1.1rem;
  background: none;
  border: 1px solid rgba(155,123,63,0.35);
  border-radius: 50%;
  width: 32px;
  height: 32px;
  color: var(--walnut-mute);
  font-family: var(--serif-display);
  font-style: normal;
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: color 0.22s ease, border-color 0.22s ease, background 0.22s ease, transform 0.3s cubic-bezier(0.65, 0, 0.35, 1);
  z-index: 2;
}
.toc-close:hover {
  color: var(--ink);
  border-color: var(--brass);
  background: rgba(226,209,169,0.4);
  transform: rotate(90deg);
}

.toc-entry {
  width: 100%;
  background: none;
  border: none;
  font: inherit;
  text-align: left;
  cursor: pointer;
  padding: 0.65rem 0.7rem 0.65rem 0.55rem;
  color: var(--walnut-soft);
  font-family: var(--serif-body);
  font-size: 0.95rem;
  display: flex; align-items: center; gap: 0.85rem;
  border-left: 2px solid transparent;
  transition: background 0.22s ease, color 0.22s ease, border-color 0.22s ease, padding-left 0.28s cubic-bezier(0.65, 0, 0.35, 1);
  margin-bottom: 0.3rem;
}
.toc-entry:hover, .toc-entry:focus-visible {
  background: rgba(226,209,169,0.42);
  color: var(--ink);
  padding-left: 0.85rem;
  outline: none;
}
.toc-entry.is-current {
  color: var(--ink);
  background: rgba(226,209,169,0.45);
  border-left-color: var(--brass);
  padding-left: 0.85rem;
}
.toc-entry .toc-date {
  font-style: italic;
}

/* ---- lightbox ---------------------------------------------------- */

.lightbox {
  position: fixed;
  inset: 0;
  background: var(--navy-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 2rem;
  animation: fadein 0.32s cubic-bezier(0.65, 0, 0.35, 1);
}
.lightbox::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 25%, rgba(200,172,116,0.05), transparent 55%),
    radial-gradient(ellipse at 70% 80%, rgba(31,45,61,0.4), transparent 60%),
    radial-gradient(ellipse 100% 80% at 50% 50%, transparent 50%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
}
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

.lb-stage {
  max-width: min(900px, 92vw);
  max-height: 92vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  position: relative;
  z-index: 1;
  animation: lb-zoomin 0.45s cubic-bezier(0.34, 1.4, 0.64, 1);
}
@keyframes lb-zoomin {
  from { opacity: 0; transform: scale(0.94); }
  to   { opacity: 1; transform: scale(1); }
}
@media (prefers-reduced-motion: reduce) {
  .lb-stage { animation: none; }
}
.lb-frame {
  background: var(--brass-faint);
  padding: 18px;
  border: 1px solid var(--brass-soft);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.3),
    0 24px 60px -16px rgba(0,0,0,0.6),
    0 8px 24px rgba(0,0,0,0.35);
}
.lb-stage img {
  max-width: 100%;
  max-height: 76vh;
  object-fit: contain;
  background: var(--card);
  display: block;
}
.lb-meta {
  margin-top: 1.1rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: 0.6rem 0;
  border-top: 1px solid rgba(200,172,116,0.25);
  width: 100%;
  max-width: 480px;
  justify-content: space-between;
}
.lb-meta-date {
  font-family: var(--serif-display);
  font-style: italic;
  color: var(--brass-faint);
  font-size: 1rem;
  letter-spacing: 0.005em;
}
.lb-counter {
  font-family: var(--mono);
  font-style: normal;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-size: 0.7rem;
  color: var(--brass-soft);
  font-weight: 500;
}
.lb-close {
  position: absolute;
  top: 1.4rem; right: 1.6rem;
  background: none;
  border: 1px solid rgba(200,172,116,0.45);
  border-radius: 50%;
  width: 42px; height: 42px;
  color: var(--brass-faint);
  font-family: var(--serif-display);
  font-style: normal;
  font-size: 1.15rem;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease, transform 0.32s cubic-bezier(0.65, 0, 0.35, 1);
  z-index: 2;
}
.lb-close:hover, .lb-close:focus-visible {
  color: var(--navy-deep);
  background: var(--brass-faint);
  border-color: var(--brass-faint);
  transform: rotate(90deg);
  outline: none;
}
.lb-nav {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  background: none;
  border: 1px solid rgba(200,172,116,0.4);
  border-radius: 50%;
  width: 52px; height: 52px;
  color: var(--brass-faint);
  font-size: 1.45rem;
  font-family: var(--serif-display);
  cursor: pointer;
  padding: 0;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
  z-index: 2;
}
.lb-prev { left: 1.4rem; }
.lb-next { right: 1.4rem; }
.lb-nav:hover, .lb-nav:focus-visible {
  color: var(--navy-deep);
  background: var(--brass-faint);
  border-color: var(--brass-faint);
  outline: none;
}

@media (max-width: 600px) {
  .lb-nav { width: 40px; height: 40px; font-size: 1.15rem; }
  .lb-prev { left: 0.5rem; }
  .lb-next { right: 0.5rem; }
  .lb-close { top: 0.7rem; right: 0.8rem; width: 36px; height: 36px; font-size: 1rem; }
  .lb-frame { padding: 10px; }
}

/* ---- responsive -------------------------------------------------- */

@media (max-width: 540px) {
  body { font-size: 17px; }
  .archive { padding: 2.4rem 1.1rem 5.5rem; }
  .title-page { padding: 2.5rem 0; }
  .letter-body { padding: 1.9rem 1.3rem 1.7rem; font-size: 1rem; }
  .signature { font-size: 2.1rem; }
  .folio { font-size: 0.6rem; margin-bottom: 1.4rem; gap: 0.6rem; }
  .folio::before, .folio::after { width: 18px; }
  .letter-head { margin-bottom: 1.4rem; }
  .letter-body .dropcap { font-size: 3.1em; width: 0.92em; }
  .chapter-bridge { font-size: 1.05rem; padding: 0 0.8rem; }
  .chapter-bridge::before, .chapter-bridge::after { font-size: 3rem; }
}

/* ---- progress bar (top of viewport) ----------------------------- */

.progress {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  pointer-events: none;
  z-index: 25;
  opacity: 0;
  transition: opacity 0.5s ease 0.2s;
}
.progress.is-visible { opacity: 1; }
.progress-track {
  position: absolute;
  inset: 0;
  background: rgba(155,123,63,0.18);
}
body.body--navy .progress-track { background: rgba(200,172,116,0.18); }
.progress-fill {
  position: absolute;
  top: 0; bottom: 0;
  left: 0;
  background: var(--brass);
  transition: width 0.42s cubic-bezier(0.65, 0, 0.35, 1);
  box-shadow: 0 0 6px rgba(155,123,63,0.4);
}
body.body--navy .progress-fill { background: var(--brass-soft); box-shadow: 0 0 6px rgba(200,172,116,0.5); }
.progress-marker {
  position: absolute;
  top: 50%;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  background: rgba(155,123,63,0.5);
  transition: background 0.3s ease, transform 0.3s ease;
}
.progress-marker.is-active {
  background: var(--brass);
  transform: translate(-50%, -50%) scale(1.4);
}
body.body--navy .progress-marker { background: rgba(200,172,116,0.45); }
body.body--navy .progress-marker.is-active { background: var(--brass-faint); }

/* ---- entrance animations --------------------------------------- */

@keyframes fade-rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.title-page .ornament,
.title-page .title,
.title-page .subtitle,
.title-page .title-locator {
  animation: fade-rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.title-page .ornament { animation-delay: 0.05s; }
.title-page .title { animation-delay: 0.18s; animation-duration: 1.2s; }
.title-page .subtitle { animation-delay: 0.42s; }
.title-page .title-locator { animation-delay: 0.62s; }

.chapter-divider > *:not(.chapter-watermark) {
  animation: fade-rise 0.85s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.chapter-divider > .chapter-numeral { animation-delay: 0.05s; }
.chapter-divider > .chapter-title { animation-delay: 0.18s; animation-duration: 1.1s; }
.chapter-divider > .chapter-loc { animation-delay: 0.36s; }
.chapter-divider > .chapter-dates { animation-delay: 0.46s; }
.chapter-divider > .route-wrap { animation-delay: 0.6s; }
.chapter-divider > .chapter-bridge { animation-delay: 0.78s; }
.chapter-watermark { animation: fade-in 1.6s ease 0.2s both; }

@media (prefers-reduced-motion: reduce) {
  .title-page .ornament,
  .title-page .title,
  .title-page .subtitle,
  .title-page .title-locator,
  .chapter-divider > *:not(.chapter-watermark),
  .chapter-watermark {
    animation: none !important;
  }
}

/* ---- print -------------------------------------------------------- */

@media print {
  html, body { overflow: visible; height: auto; }
  .paper-grain, .atmosphere, .nav-chrome, .toc-btn, .photo-link, .lb-close, .lb-nav, .progress, .postmark { display: none; }
  .stage { height: auto; overflow: visible; }
  .page-surface { position: static; box-shadow: none; }
  .archive { max-width: none; padding: 0; }
  .letter-card { page-break-inside: avoid; }
  .chapter-divider { page-break-before: always; }
  .letter-body { box-shadow: none; border: 1px solid rgba(0,0,0,0.2); }
}

/* ---- envelope rain (title page only) -------------------------------
   Continuous steady fall of small love envelopes — cream paper with
   a red heart wax seal. Same atmosphere pattern as the snow / rain
   animations: a fixed-position field, randomized fall per envelope,
   linear timing so it reads as rain rather than confetti bursts. */
.envelope-rain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 15;
  overflow: hidden;
}
.envelope-piece {
  position: absolute;
  top: -12vh;
  /* Envelope as it'd be addressed: cream paper with three address
     lines and a red stamp in the top-right corner. The stamp carries
     a tiny heart — 'love letter' reads at a glance, even at 18-26px.
     Skipping the V-flap entirely; at small size it crossed the
     rectangle and looked like an X. */
  background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 40'%3E%3Crect x='2' y='3' width='56' height='34' rx='1.4' fill='%23fdfaf2' stroke='%239b7b3f' stroke-width='1'/%3E%3Crect x='44' y='7' width='11' height='13' fill='%23c83232' stroke='%237a1c1c' stroke-width='0.5'/%3E%3Cpath d='M49.5 11.4 C48.4 10.2 46.6 10.2 46.6 12 C46.6 13.6 49.5 15.8 49.5 15.8 C49.5 15.8 52.4 13.6 52.4 12 C52.4 10.2 50.6 10.2 49.5 11.4 Z' fill='%23fff5d8' stroke='none'/%3E%3Cline x1='8' y1='23' x2='36' y2='23' stroke='%239b7b3f' stroke-width='0.8' opacity='0.55'/%3E%3Cline x1='8' y1='28' x2='40' y2='28' stroke='%239b7b3f' stroke-width='0.8' opacity='0.55'/%3E%3Cline x1='8' y1='33' x2='32' y2='33' stroke='%239b7b3f' stroke-width='0.8' opacity='0.55'/%3E%3C/svg%3E");
  background-size: contain;
  background-repeat: no-repeat;
